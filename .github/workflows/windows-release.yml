name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: AlMunadiWindows
        run: pip install -r requirements.txt pyinstaller

      - name: Build main app (PyInstaller)
        working-directory: AlMunadiWindows
        run: pyinstaller --onefile --noconsole --paths .. --name AlMunadi al_munadi.py

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore widget provider
        working-directory: AlMunadiWindows/widget_provider
        run: dotnet restore -r win-x64

      - name: Build widget provider MSIX
        working-directory: AlMunadiWindows/widget_provider
        shell: pwsh
        run: |
          # Generate a self-signed cert for the MSIX (replace with a real cert
          # for signed distribution). Trust on install with:
          #   Import-Certificate -FilePath AlMunadiWidget.cer -CertStoreLocation Cert:\LocalMachine\TrustedPeople
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=AlMunadi" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyUsage DigitalSignature `
            -FriendlyName "AlMunadi Widget Cert" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "ci-only" -Force -AsPlainText
          $pfxPath = "$PWD\AlMunadiWidget.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
          Export-Certificate -Cert $cert -FilePath "$PWD\AlMunadiWidget.cer" | Out-Null

          dotnet publish -c Release -r win-x64 --self-contained `
            /p:Platform=x64 `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=$pfxPath `
            /p:PackageCertificatePassword=ci-only

      - name: Locate MSIX
        id: locate_msix
        working-directory: AlMunadiWindows/widget_provider
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1
          if (-not $msix) { Write-Error "MSIX not produced"; exit 1 }
          Copy-Item $msix.FullName -Destination "AlMunadiWidget.msix"
          "msix_path=AlMunadiWindows/widget_provider/AlMunadiWidget.msix" >> $env:GITHUB_OUTPUT

      - name: Upload main app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlMunadi-Windows
          path: AlMunadiWindows/dist/AlMunadi.exe

      - name: Upload widget MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlMunadiWidget-Windows
          path: |
            AlMunadiWindows/widget_provider/AlMunadiWidget.msix
            AlMunadiWindows/widget_provider/AlMunadiWidget.cer

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AlMunadiWindows/dist/AlMunadi.exe
            AlMunadiWindows/widget_provider/AlMunadiWidget.msix
            AlMunadiWindows/widget_provider/AlMunadiWidget.cer
