name: Linux Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlMunadiLinux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --paths .. --name AlMunadi-Linux al_munadi_linux.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlMunadi-Linux
          path: AlMunadiLinux/dist/AlMunadi-Linux

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AlMunadiLinux/dist/AlMunadi-Linux
