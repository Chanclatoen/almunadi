name: Linux Release

on:
  push:
    tags:
      - "linux-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NextPrayerLinux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name NextPrayer-Linux next_prayer_linux.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NextPrayer-Linux
          path: NextPrayerLinux/dist/NextPrayer-Linux

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NextPrayerLinux/dist/NextPrayer-Linux
          generate_release_notes: true
