name: Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Cloudflare secrets are not configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Cloudflare secrets are not configured; skipping Pages deploy."

      - uses: cloudflare/wrangler-action@v3
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The almunadi.net site is a direct-upload Cloudflare Pages project,
          # so it only updates when this deploy runs. --branch=main marks the
          # deployment as production.
          command: pages deploy site --project-name=almunadi --branch=main
