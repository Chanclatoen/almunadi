name: Auto Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "scripts/**"
      - "site/**"
      - "worker/**"
      - "README.md"
      - "**/README.md"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  bump-tag-and-dispatch:
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(python scripts/bump-release-version.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            AlMunadiLinux/al_munadi_linux.py \
            AlMunadiWindows/al_munadi.py \
            AlMunadiMac/AlMunadi/PrayerService.swift \
            AlMunadiMac/project.yml \
            extension.js \
            metadata.json
          git commit -m "Bump release version to ${{ steps.bump.outputs.version }} [skip release]"
          git push origin HEAD:main

      - name: Create release tag
        run: |
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Dispatch platform release workflows
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh workflow run gnome-release.yml --ref "$TAG"
          gh workflow run linux-release.yml --ref "$TAG"
          gh workflow run macos-release.yml --ref "$TAG"
          gh workflow run windows-release.yml --ref "$TAG"

      - name: Summary
        run: |
          echo "Created ${{ steps.bump.outputs.tag }} and dispatched platform release workflows." >> "$GITHUB_STEP_SUMMARY"
