name: AlMunadi
options:
  bundleIdPrefix: net.almunadi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  AlMunadi:
    type: application
    platform: macOS
    sources:
      - path: AlMunadi
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadi
        PRODUCT_NAME: AlMunadi
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: AlMunadi/AlMunadi.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  AlMunadi:
    build:
      targets:
        AlMunadi: all
    run:
      config: Debug
    archive:
      config: Release
