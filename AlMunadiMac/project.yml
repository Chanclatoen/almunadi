name: AlMunadi
options:
  bundleIdPrefix: net.almunadi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  AlMunadi:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: AlMunadi
        excludes:
          - "*.entitlements"
    dependencies:
      - target: AlMunadiWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadi
        PRODUCT_NAME: AlMunadi
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: AlMunadi/AlMunadi.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES

  AlMunadiWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: AlMunadiWidget
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadi.Widget
        PRODUCT_NAME: AlMunadiWidget
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_FILE: AlMunadiWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Al Munadi"
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: AlMunadiWidget/AlMunadiWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

schemes:
  AlMunadi:
    build:
      targets:
        AlMunadi: all
        AlMunadiWidget: all
    run:
      config: Debug
    archive:
      config: Release
