name: AlMunadi
options:
  bundleIdPrefix: net.almunadi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  AlMunadi:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: AlMunadi
        excludes:
          - "*.entitlements"
    dependencies:
      - target: AlMunadiWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadi
        PRODUCT_NAME: AlMunadi
        MARKETING_VERSION: "1.0.10"
        CURRENT_PROJECT_VERSION: "11"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: AlMunadi/AlMunadi.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES

  AlMunadiWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: AlMunadiWidget
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadi.Widget
        PRODUCT_NAME: AlMunadiWidget
        MARKETING_VERSION: "1.0.10"
        CURRENT_PROJECT_VERSION: "11"
        INFOPLIST_FILE: AlMunadiWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Al Munadi"
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
        CODE_SIGN_ENTITLEMENTS: AlMunadiWidget/AlMunadiWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  AlMunadiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Shared
        excludes:
          - "WidgetSharedStore.swift"
      - path: AlMunadiTests
      - path: ../shared/fixtures/behavior-fixtures.json
        buildPhase: resources
        group: AlMunadiTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.almunadi.AlMunadiTests
        PRODUCT_NAME: AlMunadiTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

schemes:
  AlMunadi:
    build:
      targets:
        AlMunadi: all
        AlMunadiWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AlMunadiTests
    archive:
      config: Release
